<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Magazine - E-Version</title>

  <!-- Include DearFlip Core CSS Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/css/dflip.min.css" rel="stylesheet" type="text/css">
  <!-- Include Material Icons for the Toolbar Controls -->
  <link href="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/css/themify-icons.min.css" rel="stylesheet" type="text/css">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #00152e; /* Matches your college footer slate theme */
    }
    #magazine-container {
      height: 100vh;
      width: 100%;
    }
    /* Simple CSS override to ensure no branding wraps display */
    .df-share-toggle { display: none !important; }
  </style>
</head>
<body>

  <!-- The Target Container Where the Flipbook Displays -->
  <div id="magazine-container"></div>

  <!-- Include jQuery library and DearFlip Core Engine Javascript Components -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/js/dflip.min.js"></script>

  <script>
    $(document).ready(function() {
      // Configuration pointing directly to your uploaded PDF
      var pdfUrl = "Alokxandhan-2026.pdf"; 

      // Initialize the logo-free 3D web flipbook layout
      $("#magazine-container").flipBook(pdfUrl, {
        backgroundImage: "",
        backgroundColor: "#00152e",
        duration: 800, // Smoothness speed of page turn animation
        enableDownload: true, // Allows teachers/students to download original file
        enablePrint: true
      });
    });
  </script>

</body>
</html>
