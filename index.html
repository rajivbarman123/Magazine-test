<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Magazine - E-Version</title>

  <!-- Stable Production Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #00152e; /* Matches your core slate palette */
      overflow: hidden;
    }
    #magazine-container {
      width: 100%;
      height: 100vh;
    }
    /* Native style overrides to drop sharing panels and maintain a clean institutional feel */
    .df-share-toggle, .df-icon-share { display: none !important; }
  </style>
</head>
<body>

  <!-- Layout Container Anchor Point -->
  <div id="magazine-container"></div>

  <!-- Include Core JavaScript Modules -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

  <script>
    // Explicitly point the engine background components to the online library network
    var dFlipLocation = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";

    $(document).ready(function() {
      // Configuration pointing directly to your uploaded PDF
      var pdfUrl = "darpan-2026.pdf"; 

      // Initialize the logo-free 3D web flipbook layout
      $("#magazine-container").flipBook(pdfUrl, {
        backgroundImage: "",
        backgroundColor: "#00152e",
        duration: 800, // Smoothness speed of page turn animation
        enableDownload: false, // Allows teachers/students to download original file
        enableShare: false,
        hideControls: "share"
        enablePrint: true,
        webgl: true // Forces high-performance 3D canvas modes
      });
    });
  </script>

</body>
</html>
