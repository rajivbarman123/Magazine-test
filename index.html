<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Magazine - E-Version</title>

  <!-- Premium Production Scripts via Fast Delivery CDN -->
  <link href="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/css/dflip.min.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/css/themify-icons.min.css" rel="stylesheet" type="text/css">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #00152e; /* Matches your core footer slate palette */
      overflow: hidden;
    }
    /* Fixed container constraints ensuring the layout renders on mobile viewports */
    #magazine-layout {
      width: 100%;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* Native style overrides to drop sharing panels and maintain an institutional feel */
    .df-share-toggle, .df-icon-share { display: none !important; }
  </style>
</head>
<body>

  <!-- HTML Class-Based Auto Initialization (More reliable than jQuery selectors on shared hosts) -->
  <div class="_df_book" 
       id="magazine-layout" 
       backgroundcolor="#00152e"
       df-render="3d"
       source="alokxandhan2026.pdf">
  </div>

  <!-- Include Core Javascript Modules -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dearflip@1.7.5/js/dflip.min.js"></script>

</body>
</html>
