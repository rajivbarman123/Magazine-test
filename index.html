<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Magazine - E-Version</title>

  <!-- Production Stable CSS Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #00152e; /* Matches your core footer slate palette */
      overflow: hidden;
    }
    #magazine-layout {
      width: 100%;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* Native style overrides to drop sharing panels and maintain a clean institutional feel */
    .df-share-toggle, .df-icon-share { display: none !important; }
  </style>
</head>
<body>

  <!-- HTML Class-Based Auto Initialization -->
  <div class="_df_book" 
       id="magazine-layout" 
       backgroundcolor="#00152e"
       df-render="3d"
       source="alokxandhan2026.pdf">
  </div>

  <!-- Include Core JavaScript Modules with matching version dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

</body>
</html>
